apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: application-delivery
  namespace: production
  labels:
    app.kubernetes.io/name: application-delivery
    app.kubernetes.io/component: rbac
    managed-by: kube-mentor-labs
    lab: KM-LAB-001
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch

  - apiGroups: [""]
    resources:
      - pods/log
    verbs:
      - get

  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch

  - apiGroups: ["batch"]
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
